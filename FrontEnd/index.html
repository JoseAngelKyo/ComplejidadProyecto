<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lima Smart Urban System</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

    <!-- ===================== -->
    <!-- TOP BAR -->
    <!-- ===================== -->
    <header class="topbar">

        <div class="logo">
            🚦 Lima Smart Traffic System
        </div>

        <div class="status">
            <span class="dot"></span>
            API Online
        </div>

    </header>

    <!-- ===================== -->
    <!-- SIDEBAR CONTROL -->
    <!-- ===================== -->
    <aside class="sidebar">

        <h2>🧭 Panel de Control</h2>

        <p class="subtitulo">
            Selecciona nodos y ejecuta algoritmos en tiempo real
        </p>

        <!-- BUSCADOR -->
        <div class="searchBox">
            <input type="text" id="buscarNodo" placeholder="🔍 Buscar nodo...">
        </div>

        <!-- ORIGEN -->
        <label>📍 Nodo Origen</label>
        <select id="origen"></select>

        <!-- DESTINO -->
        <label>🎯 Nodo Destino</label>
        <select id="destino"></select>

        <!-- ZONA -->
        <label>🌆 Zona Urbana</label>
        <select id="zona">
            <option value="todas">Toda Lima</option>
            <option value="Lima Norte">Lima Norte</option>
            <option value="Lima Centro">Lima Centro</option>
            <option value="Lima Sur">Lima Sur</option>
        </select>

        <!-- BOTONES -->
        <div class="botones">

            <button id="btnBFS">🌐 BFS</button>
            <button id="btnDijkstra">🚗 Dijkstra</button>
            <button id="btnKruskal">🛣 Kruskal</button>

        </div>

        <!-- RESULTADOS -->
        <div class="panelResultados">

            <h3>📊 Resultado</h3>

            <p>Algoritmo: <span id="algoritmo">-</span></p>
            <p>Distancia: <span id="distancia">-</span></p>
            <p>Intersecciones: <span id="intersecciones">-</span></p>

        </div>

    </aside>

    <!-- ===================== -->
    <!-- MAPA PRINCIPAL -->
    <!-- ===================== -->
    <main>

        <section class="mapContainer">

            <div id="mapa"></div>

            <!-- INFO FLOTANTE -->
            <div class="infoBox">

                <h3>📍 Nodo Seleccionado</h3>

                <p><b>Origen:</b> <span id="infoOrigen">-</span></p>
                <p><b>Destino:</b> <span id="infoDestino">-</span></p>

                <p><b>Zona activa:</b> <span id="infoZona">Lima</span></p>

            </div>

        </section>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="mapa.js"></script>
    <script src="script.js"></script>

</body>

</html>
